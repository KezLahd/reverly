  </g>

  <text x="80" y="238" fill="url(#revName)" font-family="'Instrument Serif','Georgia',serif" font-size="176" letter-spacing="-5">Reverly<tspan fill="#9400D3">.</tspan></text>

  <text x="82" y="286" fill="#E9D5FF" fill-opacity="0.6" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="18" font-weight="300">An AI voice product for real estate. It got built. It didn't land. Kept as the receipt.</text>

  <g transform="translate(80, 324)" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="1.6">
